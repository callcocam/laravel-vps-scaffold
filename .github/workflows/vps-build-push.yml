name: vps-build-push

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.GHCR_REPO || github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        run: docker buildx create --name builder --use --bootstrap

      # Usa o GITHUB_TOKEN efêmero do próprio workflow (já tem packages:write
      # via o bloco permissions acima). NÃO depende de um secret GHCR_PAT, que o
      # setup.sh não cria — usar GHCR_PAT deixava a senha vazia e o login falhava
      # com "Cannot perform an interactive login from a non TTY device".
      # Só troque por um PAT (secrets.GHCR_PAT) se precisar push/pull entre repos
      # diferentes do mesmo owner.
      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Resolve context
        id: context
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          {
            echo "tag_channel_sha=production-${SHORT_SHA}"
            echo "tag_channel_latest=branch-production-latest"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG_SHA="${IMAGE}:${{ steps.context.outputs.tag_channel_sha }}"
          TAG_LATEST="${IMAGE}:${{ steps.context.outputs.tag_channel_latest }}"

          docker buildx build \
            --file ./Dockerfile.prod \
            --tag "${TAG_SHA}" \
            --tag "${TAG_LATEST}" \
            --cache-from type=gha,scope=vps-build-push \
            --cache-to type=gha,mode=max,scope=vps-build-push \
            --push \
            .
