services:
  app:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
      - prod_storage_data:/var/www/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - prod-network
      - traefik-global
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global"
      - "traefik.http.routers.${APP_SLUG:-production}-app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${APP_SLUG:-production}-app.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG:-production}-app.tls=true"
      - "traefik.http.routers.${APP_SLUG:-production}-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${APP_SLUG:-production}-app.priority=1"
      - "traefik.http.services.${APP_SLUG:-production}-app.loadbalancer.server.port=80"
      - "traefik.http.middlewares.${APP_SLUG:-production}-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.${APP_SLUG:-production}-sec.headers.browserXssFilter=true"
      - "traefik.http.middlewares.${APP_SLUG:-production}-sec.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.${APP_SLUG:-production}-sec.headers.frameDeny=true"
      - "traefik.http.routers.${APP_SLUG:-production}-app.middlewares=${APP_SLUG:-production}-sec"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      redis:
        condition: service_healthy

  queue:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
      - prod_storage_data:/var/www/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: php artisan queue:work redis --tries=3 --max-time=3600 --sleep=3
    networks:
      - prod-network
    depends_on:
      redis:
        condition: service_healthy

  scheduler:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
      - prod_storage_data:/var/www/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: php artisan schedule:work
    networks:
      - prod-network
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    command: >
      sh -lc 'exec redis-server
      --appendonly yes
      $${REDIS_PASSWORD:+--requirepass "$${REDIS_PASSWORD}"}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru'
    volumes:
      - prod_redis_data:/data
    networks:
      - prod-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a \"$${REDIS_PASSWORD}\"} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  prod-network:
    driver: bridge
  traefik-global:
    external: true

volumes:
  prod_redis_data:
    driver: local
  prod_storage_data:
    driver: local
