services:
  traefik:
    image: traefik:v2.11
    container_name: traefik-global
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # DESAFIO ACME — escolha UM:
      #
      # (A) tls-alpn-01 (padrão): funciona quando o DNS aponta DIRETO para a VPS.
      #     NÃO funciona se o domínio estiver atrás do proxy da Cloudflare (nuvem
      #     laranja): a Cloudflare termina o TLS na borda e o desafio nunca chega
      #     ao Traefik → erro "Cannot negotiate ALPN protocol acme-tls/1".
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      #
      # (B) dns-01 via Cloudflare: USE ESTE se os domínios ficam atrás do proxy
      #     da Cloudflare. Comente as 3 linhas tlschallenge acima, descomente as
      #     3 abaixo e defina CF_DNS_API_TOKEN no .env (token com Zone:DNS:Edit +
      #     Zone:Read). Também suporta certificados wildcard.
      # - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      # - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      # - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
    # Necessário apenas para o desafio dns-01 (B) acima:
    # environment:
    #   - "CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - traefik-global
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_BASICAUTH}"
      - "traefik.http.routers.traefik.middlewares=traefik-auth"

networks:
  traefik-global:
    external: true
